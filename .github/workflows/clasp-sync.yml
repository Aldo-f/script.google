name: Sync to Google Apps Script

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Configure .clasp.json for LabelReminder
        run: echo '{"scriptId": "1ILoH9E1JGxuG_T-k4fDcJWnvF6Fl8LPBdYD0COerNIk5z6fhknbhYSCw"}' > LabelReminder/.clasp.json

      - name: Configure .clasp.json for FollowUpReminder
        run: echo '{"scriptId": "1BC9oGoHqrkQMO6fUIzTT7Hs_X4tRMB4ZOjXUrSUgMwa6NLUJ73GZLT_u"}' > FollowUpReminder/.clasp.json

      - name: Authenticate clasp with service account
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          echo "Authenticating clasp with service account..."
          echo "$CLASP_CREDENTIALS" > ~/.clasprc.json
          echo "Authentication successful."

      - name: Push LabelReminder project
        run: npx @google/clasp push --force

      - name: Push FollowUpReminder project
        run: npx @google/clasp push --force
